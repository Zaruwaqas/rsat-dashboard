    // ===========================================
    // ✅ Corrected updateAllVisuals()
    // ===========================================
    function updateAllVisuals() {
      const data = filteredData;

      // Update team stats
      updateTeamStats(data);

      // KPI Calculations
      const total = data.length;
      const rsatCount = data.filter(r => r.RSAT >= 4).length;
      const dsatCount = data.filter(r => r.RSAT > 0 && r.RSAT <= 3).length;
      const totalValid = rsatCount + dsatCount;

      const rsatPercent = totalValid > 0 ? ((rsatCount / totalValid) * 100).toFixed(2) : 0;
      const dsatPercent = totalValid > 0 ? ((dsatCount / totalValid) * 100).toFixed(2) : 0;
      const totalScore = data.reduce((sum, r) => sum + (r.RSAT || 0), 0);
      const avgScore = total > 0 ? (totalScore / total).toFixed(1) : 0;

      document.getElementById('kpiTotal').innerText = total;
      document.getElementById('kpiRSAT').innerText = `${rsatPercent}%`;
      document.getElementById('kpiDSAT').innerText = `${dsatPercent}%`;
      document.getElementById('kpiAvg').innerText = avgScore;
      document.getElementById('recordCount').innerText = `${total} records`;

      // Destroy existing charts (except agent date-wise)
      Object.keys(charts).forEach(key => {
        if (key !== 'agentDateWise' && charts[key]) charts[key].destroy();
      });

      if (data.length === 0) return;

      const getChartHeight = (itemCount) => Math.max(350, itemCount * 35);

      // --- Agent, LOB, Lead, Country, Reason charts (unchanged) ---
      // (Your existing chart code for these remains as-is)

      // ===========================================
      // Overall RSAT vs DSAT Donut Chart (fixed)
      // ===========================================
      charts.overallRSAT = new Chart(document.getElementById('overallRSATChart'), {
        type: 'doughnut',
        data: {
          labels: [`RSAT (${rsatPercent}%)`, `DSAT (${dsatPercent}%)`],
          datasets: [{
            data: [rsatCount, dsatCount],
            backgroundColor: ['#5f7daf', '#c47b7b'],
            borderWidth: 0
          }]
        },
        options: {
          cutout: '70%',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#ffffff', usePointStyle: true, pointStyle: 'circle' }
            },
            tooltip: {
              backgroundColor: '#1e242c',
              titleColor: '#ffffff',
              bodyColor: '#ffffff',
              callbacks: {
                label: (context) => {
                  const label = context.label || '';
                  const value = context.raw;
                  const total = context.dataset.data.reduce((a, b) => a + b, 0);
                  const percent = ((value / total) * 100).toFixed(2);
                  return `${label}: ${value.toLocaleString()} (${percent}%)`;
                }
              }
            },
            datalabels: {
              color: '#ffffff',
              font: { weight: '600', size: 12 },
              formatter: (value, ctx) => {
                const total = ctx.chart.data.datasets[0].data.reduce((a, b) => a + b, 0);
                return total > 0 ? ((value / total) * 100).toFixed(2) + '%' : '0%';
              },
              backgroundColor: 'rgba(30, 36, 44, 0.8)',
              borderRadius: 12,
              padding: { top: 4, bottom: 4, left: 8, right: 8 }
            }
          }
        }
      });

      updateTable(data);
      updateDateWiseAgentChart();
    }

    // --- Table rendering (unchanged) ---
    function updateTable(data) { /* ... */ }

    // --- Initialization ---
    window.onload = function() {
      ['agentRSATChart', 'lobRSATChart', 'leadRSATChart', 'countryRSATChart', 'reasonContributionChart', 'overallRSATChart', 'agentDateWiseChart'].forEach(id => {
        const ctx = document.getElementById(id).getContext('2d');
        charts[id] = new Chart(ctx, { 
          type: 'bar', 
          data: { labels: ['No data'], datasets: [{ data: [0] }] },
          options: { maintainAspectRatio: false }
        });
      });
    };
